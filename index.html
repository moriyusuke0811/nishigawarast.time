<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交通案内 — 岡山操山高校 文化祭</title>
<style>
/* ============================================================
   CSS カスタムプロパティ（テーマ変数）
   ============================================================ */
:root {
  --bg:        #0a0e1a;
  --surface:   #111827;
  --surface2:  #1a2236;
  --border:    #1e3a5f;
  --text:      #e8f0fe;
  --muted:     #7b8db0;
  --accent:    #38bdf8;
  --train:     #34d399;
  --bus:       #fb923c;
  
  /* ステータスカラー */
  --ok:        #4ade80; /* 緑：余裕あり */
  --hurry:     #facc15; /* 黄：急げばOK */
  --danger:    #f87171; /* 赤：厳しい */
  --gone:      #6b7280; /* 灰：発車済 */

  --font-display: 'Noto Sans JP', sans-serif;
  --r: 10px;
}

/* ============================================================
   リセット & ベース
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-display);
  font-size: 16px;
  line-height: 1.3;
  -webkit-font-smoothing: antialiased;
}

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

/* ============================================================
   全体レイアウト
   ============================================================ */
#app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  padding: 12px 16px;
  gap: 10px;
}

/* ============================================================
   ヘッダー
   ============================================================ */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
}

.header-title {
  display: flex;
  align-items: center;
  gap: 14px;
}
.header-title .icon {
  font-size: 2rem;
  line-height: 1;
}
.header-title h1 {
  font-size: 1.5rem;
  font-weight: 900;
  letter-spacing: 0.03em;
  color: var(--text);
}
.header-title .sub {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 2px;
}

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
#clock {
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 0.08em;
  font-variant-numeric: tabular-nums;
}
#date-display {
  font-size: 0.85rem;
  color: var(--muted);
}
#update-badge {
  font-size: 0.75rem;
  color: var(--muted);
}

/* ============================================================
   メインコンテンツ（電車 + バス）
   ============================================================ */
#main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  min-height: 0;
}

.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.section-header .section-icon {
  font-size: 1.4rem;
}
.section-header h2 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.section-header .section-subtitle {
  font-size: 0.78rem;
  color: var(--muted);
  margin-left: auto;
}

.section-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 8px 10px;
  min-height: 0;
  overflow: hidden;
}

/* 左右分割用 */
.group-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  flex: 1;
}

.direction-group {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.direction-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.08em;
  text-align: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 2px;
}

/* ============================================================
   カード（個別路線・バス系統）
   ============================================================ */
.card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 8px 0 0 8px;
}
.train-card::before { background: var(--train); }
.bus-card::before   { background: var(--bus); }

.card-route {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.train-card .card-route { color: #6ee7b7; }
.bus-card  .card-route  { color: #fdba74; }

/* 2段表示用リストレイアウト */
.departures-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.departure-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(0,0,0,0.2);
  border-radius: 6px;
  padding: 6px 10px;
}

/* 1本目は少し大きく、2本目は少し小さく */
.departure-item:first-child {
  padding: 8px 10px;
}
.departure-item:last-child {
  opacity: 0.85;
}

.dep-main {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.card-dest {
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--text);
  white-space: nowrap;
}
.departure-item:first-child .card-dest {
  font-size: 1.25rem;
}

.card-time {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

.dep-status-col {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.card-countdown {
  font-size: 1.6rem;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  min-width: 4.5ch;
  text-align: right;
}
.departure-item:first-child .card-countdown {
  font-size: 2rem;
}

.card-status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  min-width: 80px;
}
.status-ok     { background: rgba(74,222,128,.15); color: var(--ok);     border: 1px solid rgba(74,222,128,.4); }
.status-hurry  { background: rgba(250,204,21,.15);  color: var(--hurry);  border: 1px solid rgba(250,204,21,.4); }
.status-tight  { background: rgba(248,113,113,.15); color: var(--danger); border: 1px solid rgba(248,113,113,.4); }
.status-gone   { background: rgba(107,114,128,.15); color: var(--gone);   border: 1px solid rgba(107,114,128,.4); }

.cd-ok     { color: var(--ok); }
.cd-hurry  { color: var(--hurry); }
.cd-tight  { color: var(--danger); }
.cd-gone   { color: var(--gone); }

/* ============================================================
   バス用レイアウト
   ============================================================ */
.bus-operator-name {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--bus);
  letter-spacing: 0.08em;
  margin-bottom: 2px;
}
.bus-operator-stop {
  font-size: 0.7rem;
  color: var(--muted);
  margin-bottom: 6px;
}
.bus-routes {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ============================================================
   フッター (判例)
   ============================================================ */
#footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-size: 0.8rem;
  color: var(--muted);
  flex-shrink: 0;
}
.footer-note {
  display: flex;
  align-items: center;
  gap: 20px;
  font-weight: 700;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  display: inline-block;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}
.blink { animation: blink 1s ease-in-out infinite; }

</style>
</head>

function toDate(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}

function minutesUntil(hhmm) {
  return (toDate(hhmm) - now()) / 60000;
}

// 指定した件数（count）だけ次の便を取得
function getNextDepartures(times, count = 2) {
  const upcoming = times
    .map(item => {
      const isStr = typeof item === 'string';
      const timeStr = isStr ? item : item.time;
      const destStr = isStr ? null : item.dest;
      return { time: timeStr, dest: destStr, min: minutesUntil(timeStr) };
    })
    .filter(t => t.min > -1)
    .sort((a, b) => a.min - b.min);
  return upcoming.slice(0, count);
}

// 時間に応じた緑・黄・赤のステータス判定
function getStatus(minutesLeft, normalMin, hurryMin) {
  if (minutesLeft < 0) return { label: '発車済', cls: 'status-gone',  cdCls: 'cd-gone' };
  if (minutesLeft >= normalMin) return { label: '余裕あり', cls: 'status-ok',   cdCls: 'cd-ok' }; // 12分以上（緑）
  if (minutesLeft >= hurryMin)  return { label: '急げばOK', cls: 'status-hurry',cdCls: 'cd-hurry' }; // 8〜11分（黄）
  return { label: '厳しい', cls: 'status-tight', cdCls: 'cd-tight' }; // 8分未満（赤）
}

function fmtMin(min) {
  if (min < 0) return '発車済';
  if (min < 1) return '間もなく';
  return `${Math.floor(min)}分`;
}

/* ============================================================
   時計 UI 更新
   ============================================================ */
function updateClock() {
  const n = now();
  const pad = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;

  const week = ['日','月','火','水','木','金','土'];
  document.getElementById('date-display').textContent =
    `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日（${week[n.getDay()]}）`;
}

/* ============================================================
   UI 生成（電車・バス）
   ============================================================ */

function generateDepartureItem(dep, defaultDest, walkConfig, idPrefix, index) {
  const status = getStatus(dep.min, walkConfig.normal, walkConfig.hurry);
  const blinkCls = dep.min <= walkConfig.hurry && dep.min >= 0 ? 'blink' : '';
  const displayDest = dep.dest ? `${dep.dest} 行き` : defaultDest;

  return `
    <div class="departure-item">
      <div class="dep-main">
        <div class="card-dest">${displayDest}</div>
        <div class="card-time">${dep.time}</div>
      </div>
      <div class="dep-status-col">
        <div class="card-countdown ${status.cdCls} ${blinkCls}" id="${idPrefix}-${index}">${fmtMin(dep.min)}</div>
        <div class="card-status ${status.cls}" id="${idPrefix}-badge-${index}">${status.label}</div>
      </div>
    </div>
  `;
}

function buildTrainCards() {
  const container = document.getElementById('train-cards');
  container.innerHTML = '';

  TRAIN_GROUPS.forEach(group => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'direction-group';

    const title = document.createElement('div');
    title.className = 'direction-title';
    title.textContent = group.name;
    groupDiv.appendChild(title);

    group.lines.forEach(line => {
      // 2段表示にするために2件取得
      const nexts = getNextDepartures(line.times, 2);
      const card = document.createElement('div');
      card.className = 'card train-card';
      card.id = `card-${line.id}`;

      let innerHtml = `<div class="card-route">${line.label}</div>`;

      if (nexts.length === 0) {
        innerHtml += `<div style="color:var(--muted);font-size:0.9rem;margin-top:8px">本日の運行終了</div>`;
      } else {
        innerHtml += `<div class="departures-list">`;
        nexts.forEach((dep, i) => {
          innerHtml += generateDepartureItem(dep, line.dest, WALK_MINUTES.train, `cd-train-${line.id}`, i);
        });
        innerHtml += `</div>`;
      }
      card.innerHTML = innerHtml;
      groupDiv.appendChild(card);
    });
    container.appendChild(groupDiv);
  });
}

function buildBusCards() {
  const body = document.getElementById('bus-body');
  body.innerHTML = '';

  BUS_OPERATORS.forEach(op => {
    const opDiv = document.createElement('div');
    opDiv.className = 'direction-group';

    const title = document.createElement('div');
    title.className = 'bus-operator-name';
    title.innerHTML = `🚌 ${op.name}`;
    
    const stop = document.createElement('div');
    stop.className = 'bus-operator-stop';
    stop.innerHTML = `📍 ${op.stop}`;
    
    opDiv.appendChild(title);
    opDiv.appendChild(stop);

    const routesDiv = document.createElement('div');
    routesDiv.className = 'bus-routes';

    op.routes.forEach(route => {
      // バスも同様に2段表示にする
      const nexts = getNextDepartures(route.times, 2);
      const card = document.createElement('div');
      card.className = 'card bus-card';
      card.id = `card-${route.id}`;

      let innerHtml = `<div class="card-route">${route.dest}</div>`;

      if (nexts.length === 0) {
        innerHtml += `<div style="color:var(--muted);font-size:0.85rem;margin-top:6px">本日の運行終了</div>`;
      } else {
        innerHtml += `<div class="departures-list">`;
        nexts.forEach((dep, i) => {
          innerHtml += generateDepartureItem(dep, route.dest, WALK_MINUTES.bus, `cd-bus-${route.id}`, i);
        });
        innerHtml += `</div>`;
      }
      card.innerHTML = innerHtml;
      routesDiv.appendChild(card);
    });
    
    opDiv.appendChild(routesDiv);
    body.appendChild(opDiv);
  });
}

/* ============================================================
   カウントダウンのみ高速更新
   ============================================================ */
function updateCountdowns() {
  TRAIN_GROUPS.forEach(group => {
    group.lines.forEach(line => {
      const nexts = getNextDepartures(line.times, 2);
      nexts.forEach((dep, i) => {
        const el = document.getElementById(`cd-train-${line.id}-${i}`);
        const badge = document.getElementById(`cd-train-${line.id}-badge-${i}`);
        if (!el || !badge) return;

        const status = getStatus(dep.min, WALK_MINUTES.train.normal, WALK_MINUTES.train.hurry);
        el.textContent = fmtMin(dep.min);
        el.className = `card-countdown ${status.cdCls}${dep.min <= WALK_MINUTES.train.hurry && dep.min >= 0 ? ' blink' : ''}`;
        
        badge.className = `card-status ${status.cls}`;
        badge.textContent = status.label;
      });
    });
  });

  BUS_OPERATORS.forEach(op => {
    op.routes.forEach(route => {
      const nexts = getNextDepartures(route.times, 2);
      nexts.forEach((dep, i) => {
        const el = document.getElementById(`cd-bus-${route.id}-${i}`);
        const badge = document.getElementById(`cd-bus-${route.id}-badge-${i}`);
        if (!el || !badge) return;

        const status = getStatus(dep.min, WALK_MINUTES.bus.normal, WALK_MINUTES.bus.hurry);
        el.textContent = fmtMin(dep.min);
        el.className = `card-countdown ${status.cdCls}${dep.min <= WALK_MINUTES.bus.hurry && dep.min >= 0 ? ' blink' : ''}`;
        
        badge.className = `card-status ${status.cls}`;
        badge.textContent = status.label;
      });
    });
  });
}

/* ============================================================
   フル再描画
   ============================================================ */
function fullUpdate() {
  buildTrainCards();
  buildBusCards();
  const t = now();
  const pad = x => String(x).padStart(2,'0');
  document.getElementById('update-badge').textContent =
    `🔄 最終更新 ${pad(t.getHours())}:${pad(t.getMinutes())}`;
}

/* ============================================================
   初期化 & タイマー設定
   ============================================================ */
(function init() {
  updateClock();
  fullUpdate();

  setInterval(updateClock, 1000);        // 時計：毎秒
  setInterval(updateCountdowns, 10000);  // カウントダウン：10秒ごと
  setInterval(fullUpdate, 60000);        // フル再描画：1分ごと
})();
</script>
</body>

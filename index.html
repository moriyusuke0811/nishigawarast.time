<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交通案内 — 岡山操山高校 文化祭</title>
<style>
/* ============================================================
   CSS カスタムプロパティ（テーマ変数）
   ============================================================ */
:root {
  --bg-main:   #050505;
  --bg-panel:  #111111;
  --bg-header: #1a1a1a;
  --border:    #2a2a2a;
  
  --text-main: #ffffff;
  --text-sub:  #a1a1aa;
  --accent:    #00f0ff; /* サイバーなシアン */
  
  /* ステータスカラー */
  --ok-text:     #4ade80;
  --ok-bg:       rgba(74, 222, 128, 0.15);
  --hurry-text:  #facc15;
  --hurry-bg:    rgba(250, 204, 21, 0.15);
  --tight-text:  #f87171;
  --tight-bg:    rgba(248, 113, 113, 0.15);
  --gone-text:   #71717a;
  --gone-bg:     rgba(113, 113, 122, 0.15);

  --font-main: 'Noto Sans JP', sans-serif;
}

/* ============================================================
   リセット & ベース
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-main);
  color: var(--text-main);
  font-family: var(--font-main);
  -webkit-font-smoothing: antialiased;
}

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

/* ============================================================
   全体レイアウト
   ============================================================ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 24px 32px;
  gap: 24px;
}

/* ============================================================
   ヘッダー
   ============================================================ */
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 2px solid var(--border);
  padding-bottom: 16px;
  flex-shrink: 0;
}

.title-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.title-en {
  font-size: 1.2rem;
  font-weight: 900;
  letter-spacing: 0.15em;
  color: var(--accent);
}
.title-ja {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 0.05em;
}

.time-group {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
#clock {
  font-size: 4rem;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.05em;
}
#date-display {
  font-size: 1.2rem;
  color: var(--text-sub);
  margin-top: 8px;
  font-weight: 700;
}

/* ============================================================
   メインコンテンツ（2x2グリッド）
   ============================================================ */
main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 24px;
  flex: 1;
  min-height: 0;
}

/* パネル（各方面の枠） */
.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-header);
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-size: 1.4rem;
  font-weight: 900;
  letter-spacing: 0.05em;
}
.panel-walk {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-sub);
  background: rgba(255,255,255,0.1);
  padding: 4px 12px;
  border-radius: 20px;
}

/* リスト部分 */
.list {
  display: flex;
  flex-direction: column;
  flex: 1;
}

.row {
  display: flex;
  align-items: center;
  flex: 1; /* 均等に高さを分配 */
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
}
.row:last-child {
  border-bottom: none;
}
.row.empty {
  justify-content: center;
  color: var(--text-sub);
  font-size: 1.2rem;
  font-weight: 700;
}

/* 行の各要素 */
.col-time {
  width: 130px;
  font-size: 2.8rem;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
}
.col-dest {
  flex: 1;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-sub);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.col-min {
  width: 120px;
  text-align: right;
  font-size: 2.8rem;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  padding-right: 20px;
}
.col-status {
  width: 160px;
  text-align: center;
  font-size: 1.2rem;
  font-weight: 900;
  padding: 12px 0;
  border-radius: 8px;
  letter-spacing: 0.05em;
}

/* ステータスバリエーション */
.st-ok    { background: var(--ok-bg);    color: var(--ok-text);    border: 1px solid rgba(74,222,128,0.3); }
.st-hurry { background: var(--hurry-bg); color: var(--hurry-text); border: 1px solid rgba(250,204,21,0.3); }
.st-tight { background: var(--tight-bg); color: var(--tight-text); border: 1px solid rgba(248,113,113,0.3); }
.st-gone  { background: var(--gone-bg);  color: var(--gone-text);  border: 1px solid rgba(113,113,122,0.3); }

.cd-ok    { color: var(--ok-text); }
.cd-hurry { color: var(--hurry-text); }
.cd-tight { color: var(--tight-text); }
.cd-gone  { color: var(--gone-text); }

@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.blink { animation: blink 1s ease-in-out infinite; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="title-group">
      <div class="title-en">SOZAN TRAIN & BUS TRANSIT</div>
      <div class="title-ja">岡山操山高校 文化祭 交通案内</div>
    </div>
    <div class="time-group">
      <div id="clock">--:--:--</div>
      <div id="date-display">----年--月--日</div>
    </div>
  </header>

  <main>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">🚃 電車 - 岡山方面</div>
        <div class="panel-walk">駅まで徒歩約5分</div>
      </div>
      <div class="list" id="list-train-west"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">🚃 電車 - 東岡山方面</div>
        <div class="panel-walk">駅まで徒歩約5分</div>
      </div>
      <div class="list" id="list-train-east"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">🚌 バス - 宇野バス（中央警察署前）</div>
        <div class="panel-walk">バス停まで徒歩約5分</div>
      </div>
      <div class="list" id="list-bus-uno"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">🚌 バス - 岡電バス（浜本町）</div>
        <div class="panel-walk">バス停まで徒歩約4分</div>
      </div>
      <div class="list" id="list-bus-okaden"></div>
    </div>
  </main>
</div>

<script>
/* ============================================================
   データ定義
   ============================================================ */

const WALK_MINUTES = {
  train:   5, // 西川原・就実駅
  uno:     5, // 中央警察署前
  okaden:  4  // 浜本町
};

// 方面別に複数路線のデータを束ねる
const TRANSIT_DATA = {
  'train-west': {
    walk: WALK_MINUTES.train,
    lines: [
      {
        dest: '新見・備中高梁',
        times: ['07:19','09:04','11:12','12:12','12:57','13:27','14:31','15:59','16:27','17:36','18:35','18:58','20:14','21:04']
      },
      {
        dest: '岡山・福山方面',
        times: [
          '05:48','06:06','06:29','06:48','07:07','07:44','07:50','07:58','08:25','08:31','08:36','08:50',
          '09:25','09:34','09:40','10:03','10:26','10:34','10:51','11:29','11:34','11:59','12:26','12:35',
          '13:02','13:33','13:52','13:57','14:35','14:58','15:05','15:27','15:32','15:54','16:33','16:52',
          '16:59','17:25','18:00','18:04','18:23','18:51','19:16','19:34','19:44','19:54','20:06','20:27',
          '20:32','21:10','21:34','21:41','21:57','22:02','22:38','23:05','23:26'
        ]
      }
    ]
  },
  'train-east': {
    walk: WALK_MINUTES.train,
    lines: [
      {
        dest: '東岡山・瀬戸',
        times: [
          '07:10','07:22','07:35','07:48','08:02','08:15','08:28','08:41','08:55','09:08','09:22','09:35',
          '09:50','10:04','10:18','10:32','10:46','11:00','11:14','11:28','11:42','11:56','12:10','12:24',
          '12:38','12:52','13:06','13:20','13:34','13:48','14:02','14:16','14:30','14:44','14:58','15:12',
          '15:26','15:40','15:54','16:08','16:22','16:36','16:50','17:04','17:18','17:32','17:46','18:00',
          '18:14','18:28','18:42','18:56','19:10','19:24','19:38','19:52','20:06','20:20','20:34','20:48',
          '21:02','21:20','21:40','22:00','22:20','22:40'
        ]
      },
      {
        dest: '西大寺・播州赤穂', // 赤穂線は行き先が細かいので大枠を表示
        times: [
          '05:17','05:59','06:25','07:30','07:42','07:55','08:28','08:35','08:53','10:11','10:59','11:27',
          '11:57','12:27','12:44','13:26','13:58','14:25','14:43','15:00','15:28','15:58','16:21','16:38',
          '17:02','17:30','17:53','18:20','18:44','19:15','19:37','20:08','20:44','21:26','22:08','23:15'
        ]
      }
    ]
  },
  'bus-uno': {
    walk: WALK_MINUTES.uno,
    lines: [
      {
        dest: '表町方面',
        times: ['07:15','07:35','07:55','08:15','08:35','08:55','09:15','09:35','09:55','10:15','10:35','10:55',
                '11:15','11:35','11:55','12:15','12:35','12:55','13:15','13:35','13:55','14:15','14:35','14:55',
                '15:15','15:35','15:55','16:15','16:35','16:55','17:15','17:35','17:55','18:15','18:35','18:55',
                '19:15','19:45','20:15','20:45','21:15','21:45']
      },
      {
        dest: '東岡山方面',
        times: ['07:20','07:50','08:20','08:50','09:20','09:50','10:20','10:50','11:20','11:50','12:20','12:50',
                '13:20','13:50','14:20','14:50','15:20','15:50','16:20','16:50','17:20','17:50','18:20','18:50',
                '19:20','19:50','20:30','21:10','21:50']
      }
    ]
  },
  'bus-okaden': {
    walk: WALK_MINUTES.okaden,
    lines: [
      {
        dest: '岡山駅方面',
        times: ['07:05','07:25','07:45','08:05','08:25','08:45','09:05','09:25','09:45','10:05','10:25','10:45',
                '11:05','11:25','11:45','12:05','12:25','12:45','13:05','13:25','13:45','14:05','14:25','14:45',
                '15:05','15:25','15:45','16:05','16:25','16:45','17:05','17:25','17:45','18:05','18:25','18:45',
                '19:05','19:30','20:00','20:30','21:00','21:40']
      },
      {
        dest: '藤原団地方面',
        times: ['07:30','08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00',
                '13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00',
                '19:40','20:20','21:00','21:40']
      }
    ]
  }
};

/* ============================================================
   ユーティリティ
   ============================================================ */

function now() { return new Date(); }

function toDate(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}

function minutesUntil(hhmm) {
  return (toDate(hhmm) - now()) / 60000;
}

// 特定のグループ（複数路線）から直近 count 本を抽出
function getTopDepartures(groupData, count = 3) {
  let combined = [];
  groupData.lines.forEach(line => {
    line.times.forEach(timeStr => {
      combined.push({
        time: timeStr,
        dest: line.dest,
        min: minutesUntil(timeStr)
      });
    });
  });
  
  // 過ぎた時間を除外し、近い順にソートして指定件数を返す
  return combined
    .filter(t => t.min > -1)
    .sort((a, b) => a.min - b.min)
    .slice(0, count);
}

// 残り時間と徒歩分数から状態を判定
function getStatus(minutesLeft, walkMin) {
  const margin = minutesLeft - walkMin;
  if (margin >= 5) return { label: '余裕あり', cls: 'st-ok',    cdCls: 'cd-ok' };
  if (margin >= 2) return { label: '急げ！',   cls: 'st-hurry', cdCls: 'cd-hurry' };
  if (margin >= 0) return { label: '厳しい',   cls: 'st-tight', cdCls: 'cd-tight' };
  return           { label: '発車済',   cls: 'st-gone',  cdCls: 'cd-gone' };
}

function fmtMin(min) {
  if (min < 1) return '0分';
  return `${Math.floor(min)}分`;
}

/* ============================================================
   UI 更新処理
   ============================================================ */

function updateClock() {
  const n = now();
  const pad = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;

  const week = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('date-display').textContent =
    `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日 (${week[n.getDay()]})`;
}

function renderList(containerId, dataKey) {
  const container = document.getElementById(containerId);
  const groupData = TRANSIT_DATA[dataKey];
  const deps = getTopDepartures(groupData, 3);

  container.innerHTML = '';

  if (deps.length === 0) {
    container.innerHTML = `<div class="row empty">本日の運行は終了しました</div>`;
    return;
  }

  // 常に3行分レイアウトを作る（足りない分は空行）
  for (let i = 0; i < 3; i++) {
    const row = document.createElement('div');
    row.className = 'row';

    if (i < deps.length) {
      const dep = deps[i];
      const st = getStatus(dep.min, groupData.walk);
      const blink = (dep.min <= 3 && dep.min >= 0) ? 'blink' : '';

      row.innerHTML = `
        <div class="col-time">${dep.time}</div>
        <div class="col-dest">${dep.dest}行</div>
        <div class="col-min ${st.cdCls} ${blink}">${fmtMin(dep.min)}</div>
        <div class="col-status ${st.cls}">${st.label}</div>
      `;
    } else {
      // 便がない枠
      row.innerHTML = `
        <div class="col-time" style="color:var(--border)">--:--</div>
        <div class="col-dest"></div>
        <div class="col-min"></div>
        <div class="col-status"></div>
      `;
    }
    container.appendChild(row);
  }
}

function updateAllLists() {
  renderList('list-train-west', 'train-west');
  renderList('list-train-east', 'train-east');
  renderList('list-bus-uno',    'bus-uno');
  renderList('list-bus-okaden', 'bus-okaden');
}

/* ============================================================
   初期化 & ループ
   ============================================================ */
(function init() {
  updateClock();
  updateAllLists();

  setInterval(updateClock, 1000);       // 時計は毎秒
  setInterval(updateAllLists, 10000);   // リストは10秒ごとに再計算・描画
})();
</script>
</body>
</html>

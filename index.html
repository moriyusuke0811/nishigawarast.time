<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交通案内 — 岡山操山高校 文化祭</title>
<style>
/* ============================================================
   CSS カスタムプロパティ（テーマ変数）
   ============================================================ */
:root {
  --bg:        #0a0e1a;
  --surface:   #111827;
  --surface2:  #1a2236;
  --border:    #1e3a5f;
  --text:      #e8f0fe;
  --muted:     #7b8db0;
  --accent:    #38bdf8;
  --train:     #34d399;
  --bus:       #fb923c;
  --ok:        #4ade80;
  --hurry:     #facc15;
  --danger:    #f87171;
  --gone:      #6b7280;

  --font-display: 'Noto Sans JP', sans-serif;
  --r: 10px;
}

/* ============================================================
   リセット & ベース
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-display);
  font-size: 16px;
  line-height: 1.3;
  -webkit-font-smoothing: antialiased;
}

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

/* ============================================================
   全体レイアウト（縦に3段）
   ============================================================ */
#app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  padding: 12px 16px;
  gap: 10px;
}

/* ============================================================
   ヘッダー
   ============================================================ */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
}

.header-title {
  display: flex;
  align-items: center;
  gap: 14px;
}
.header-title .icon {
  font-size: 2rem;
  line-height: 1;
}
.header-title h1 {
  font-size: 1.5rem;
  font-weight: 900;
  letter-spacing: 0.03em;
  color: var(--text);
}
.header-title .sub {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 2px;
}

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
#clock {
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 0.08em;
  font-variant-numeric: tabular-nums;
}
#date-display {
  font-size: 0.85rem;
  color: var(--muted);
}
#update-badge {
  font-size: 0.75rem;
  color: var(--muted);
}

/* ============================================================
   メインコンテンツ（電車 + バス）
   ============================================================ */
#main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  min-height: 0;
}

/* ============================================================
   セクション共通
   ============================================================ */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.section-header .section-icon {
  font-size: 1.4rem;
}
.section-header h2 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.section-header .section-subtitle {
  font-size: 0.78rem;
  color: var(--muted);
  margin-left: auto;
}

.section-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 8px 10px;
  min-height: 0;
  overflow: hidden;
}

.train-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

/* ============================================================
   カード（個別路線・バス系統）
   ============================================================ */
.card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 8px 0 0 8px;
}
.train-card::before { background: var(--train); }
.bus-card::before   { background: var(--bus); }

.card-route {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.train-card .card-route { color: #6ee7b7; }
.bus-card  .card-route  { color: #fdba74; }

.card-dest {
  font-size: 1.25rem;
  font-weight: 900;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-time-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-top: 2px;
}
.card-time {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.card-countdown {
  font-size: 2rem;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  min-width: 4.5ch;
}

.card-walk {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 2px;
}

.card-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  align-self: flex-start;
  margin-top: 2px;
}
.status-ok     { background: rgba(74,222,128,.15); color: var(--ok);     border: 1px solid rgba(74,222,128,.4); }
.status-hurry  { background: rgba(250,204,21,.15);  color: var(--hurry);  border: 1px solid rgba(250,204,21,.4); }
.status-tight  { background: rgba(248,113,113,.15); color: var(--danger); border: 1px solid rgba(248,113,113,.4); }
.status-gone   { background: rgba(107,114,128,.15); color: var(--gone);   border: 1px solid rgba(107,114,128,.4); }

.cd-ok     { color: var(--ok); }
.cd-hurry  { color: var(--hurry); }
.cd-tight  { color: var(--danger); }
.cd-gone   { color: var(--gone); }

/* ============================================================
   バスセクション内レイアウト
   ============================================================ */
.bus-operator {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px 8px;
}
.bus-operator-name {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--bus);
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}
.bus-operator-stop {
  font-size: 0.7rem;
  color: var(--muted);
  margin-bottom: 6px;
}
.bus-routes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

/* ============================================================
   フッター
   ============================================================ */
#footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-size: 0.75rem;
  color: var(--muted);
  flex-shrink: 0;
}
.footer-note {
  display: flex;
  align-items: center;
  gap: 16px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}

/* ============================================================
   点滅（残り3分以下）
   ============================================================ */
@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}
.blink { animation: blink 1s ease-in-out infinite; }

</style>

/* ============================================================
   ユーティリティ関数
   ============================================================ */

function now() { return new Date(); }

function toDate(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}

function minutesUntil(hhmm) {
  return (toDate(hhmm) - now()) / 60000;
}

/** * 次の便を返す
 * times: 文字列('07:30') または オブジェクト({time: '07:30', dest: '長船'}) の配列
 */
function getNextDepartures(times, count = 1) {
  const upcoming = times
    .map(item => {
      const isStr = typeof item === 'string';
      const timeStr = isStr ? item : item.time;
      const destStr = isStr ? null : item.dest;
      return { time: timeStr, dest: destStr, min: minutesUntil(timeStr) };
    })
    .filter(t => t.min > -1)   // 1分前まで表示
    .sort((a, b) => a.min - b.min);
  return upcoming.slice(0, count);
}

function getStatus(minutesLeft, walkMin) {
  const margin = minutesLeft - walkMin;
  if (minutesLeft < 0)      return { label: '発車済み', cls: 'status-gone',  cdCls: 'cd-gone'  };
  if (margin >= 5)           return { label: '余裕あり ✓', cls: 'status-ok',   cdCls: 'cd-ok'    };
  if (margin >= 2)           return { label: '急げ！',  cls: 'status-hurry', cdCls: 'cd-hurry' };
  if (margin >= 0)           return { label: '厳しい…', cls: 'status-tight', cdCls: 'cd-tight' };
  return                     { label: '間に合わない', cls: 'status-gone',  cdCls: 'cd-gone'  };
}

function fmtMin(min) {
  if (min < 0) return '発車済';
  if (min < 1) return '間もなく';
  return `${Math.floor(min)}分`;
}

/* ============================================================
   時計 UI 更新
   ============================================================ */
function updateClock() {
  const n = now();
  const pad = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;

  const week = ['日','月','火','水','木','金','土'];
  document.getElementById('date-display').textContent =
    `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日（${week[n.getDay()]}）`;
}

/* ============================================================
   電車カード 生成
   ============================================================ */
function buildTrainCards() {
  const container = document.getElementById('train-cards');
  container.innerHTML = '';

  TRAIN_LINES.forEach(line => {
    const nexts = getNextDepartures(line.times, 1);
    const card = document.createElement('div');
    card.className = 'card train-card';
    card.id = `card-${line.id}`;

    if (nexts.length === 0) {
      card.innerHTML = `
        <div class="card-route">${line.label}</div>
        <div class="card-dest">${line.dest}</div>
        <div style="color:var(--muted);font-size:0.9rem;margin-top:8px">本日の運行終了</div>
      `;
    } else {
      const dep = nexts[0];
      const status = getStatus(dep.min, WALK_MINUTES.train);
      const blinkCls = dep.min <= 3 && dep.min >= 0 ? 'blink' : '';
      
      // 個別の行き先データがあれば優先表示、なければ路線の基本行き先
      const displayDest = dep.dest ? `${dep.dest} 行き` : line.dest;

      card.innerHTML = `
        <div class="card-route">${line.label}</div>
        <div class="card-dest">${displayDest}</div>
        <div class="card-time-row">
          <span class="card-time">${dep.time}</span>
          <span class="card-countdown ${status.cdCls} ${blinkCls}" id="cd-${line.id}">${fmtMin(dep.min)}</span>
        </div>
        <div class="card-walk">🚶 徒歩約${WALK_MINUTES.train}分</div>
        <div class="card-status ${status.cls}">${status.label}</div>
      `;
    }
    container.appendChild(card);
  });
}

        const displayDest = dep.dest ? `${dep.dest} 行き` : route.dest;

        inner = `
          <div class="card-route">${displayDest}</div>
          <div class="card-time-row" style="margin-top:4px">
            <span class="card-time" style="font-size:1.3rem">${dep.time}</span>
            <span class="card-countdown ${status.cdCls} ${blinkCls}" style="font-size:1.5rem" id="bcd-${route.id}">${fmtMin(dep.min)}</span>
          </div>
          <div class="card-walk" style="font-size:0.7rem">🚶 徒歩約${op.walkMinutes}分</div>
          <div class="card-status ${status.cls}" style="font-size:0.8rem;padding:2px 8px">${status.label}</div>
        `;
      }

      return `<div class="card bus-card" id="card-${route.id}">${inner}</div>`;
    }).join('');

    opDiv.innerHTML = `
      <div class="bus-operator-name">🚌 ${op.name}</div>
      <div class="bus-operator-stop">📍 ${op.stop}（徒歩約${op.walkMinutes}分）</div>
      <div class="bus-routes">${routesHtml}</div>
    `;
    body.appendChild(opDiv);
  });
}

/* ============================================================
   カウントダウンのみ高速更新（10秒ごと）
   ============================================================ */
function updateCountdowns() {
  TRAIN_LINES.forEach(line => {
    const el = document.getElementById(`cd-${line.id}`);
    if (!el) return;
    const nexts = getNextDepartures(line.times, 1);
    if (nexts.length === 0) return;
    const dep = nexts[0];
    const status = getStatus(dep.min, WALK_MINUTES.train);
    el.textContent = fmtMin(dep.min);
    el.className = `card-countdown ${status.cdCls}${dep.min <= 3 && dep.min >= 0 ? ' blink' : ''}`;

    const card = document.getElementById(`card-${line.id}`);
    if (card) {
      const badge = card.querySelector('.card-status');
      if (badge) {
        badge.className = `card-status ${status.cls}`;
        badge.textContent = status.label;
      }
    }
  });

  BUS_OPERATORS.forEach(op => {
    op.routes.forEach(route => {
      const el = document.getElementById(`bcd-${route.id}`);
      if (!el) return;
      const nexts = getNextDepartures(route.times, 1);
      if (nexts.length === 0) return;
      const dep = nexts[0];
      const status = getStatus(dep.min, op.walkMinutes);
      el.textContent = fmtMin(dep.min);
      el.className = `card-countdown ${status.cdCls}${dep.min <= 3 && dep.min >= 0 ? ' blink' : ''}`;

      const card = document.getElementById(`card-${route.id}`);
      if (card) {
        const badge = card.querySelector('.card-status');
        if (badge) {
          badge.className = `card-status ${status.cls}`;
          badge.textContent = status.label;
        }
      }
    });
  });
}

/* ============================================================
   フル再描画（1分ごと — 次の便が変わることがある）
   ============================================================ */
function fullUpdate() {
  buildTrainCards();
  buildBusCards();
  const t = now();
  const pad = x => String(x).padStart(2,'0');
  document.getElementById('update-badge').textContent =
    `🔄 最終更新 ${pad(t.getHours())}:${pad(t.getMinutes())}`;
}

/* ============================================================
   初期化 & タイマー設定
   ============================================================ */
(function init() {
  updateClock();
  fullUpdate();

  setInterval(updateClock, 1000);        // 時計：毎秒
  setInterval(updateCountdowns, 10000);  // カウントダウン：10秒ごと
  setInterval(fullUpdate, 60000);        // フル再描画：1分ごと
})();
</script>
</body>

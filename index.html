<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>松柏祭 交通案内</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

:root {
  --sozanblue:#171D55;
  --darkblue:    #030312;
  --surf:    #141f50;
  --surf2:   #141f50;
  --card:    #202439;
  --bdr:     #2a3a7a;
  --text:    #ffffff;
  --muted:   #7888b8;
  --accent:  #5bc8fa;
  --ok:      #4ade80;
  --hurry:   #fbbf24;
  --danger:  #f87171;
  --gone:    #64748b;
  --r: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: linear-gradient(90deg, #474796, #030312);
  color: var(--text);
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ---- App ---- */
#app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
  padding: 10px 12px;
  gap: 8px;
}

/* ---- HEADER ---- */
#hdr {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 8px 20px;
}
.h-festival {
  font-size: 3.5rem; font-weight: 900; letter-spacing:.06em;
  color:#fff
}
.h-center { display:flex; justify-content:center; }
.h-pill {
  background: #fff; color: var(--sozanblue);
  border-radius: 14px; padding: 6px 32px;
  font-size: 3.0rem; font-weight: 900; letter-spacing: .12em;
}
.h-right { display:flex; flex-direction:column; align-items:flex-end; gap:1px; }
#clock {
  font-size: 3rem; font-weight: 900; letter-spacing:.06em;
  font-variant-numeric: tabular-nums; line-height:1;
  color:#fff;
}
#hdr-date  { font-size:.85rem; color:#fff; }
#hdr-badge { font-size:.72rem; color:#fff; display:flex; gap:6px; align-items:center; }

.badge-mode { background:var(--gone); color:#000; padding:1px 6px; border-radius:10px; font-weight:bold; }
.badge-sched { background:rgba(255,255,255,0.2); color:#fff; padding:1px 6px; border-radius:10px; font-weight:bold; }

/* ---- MAIN 3-col ---- */
#main {
  display: grid;
  grid-template-columns: 1.15fr 0.95fr 0.42fr;
  gap: 10px;
  min-height: 0;
}

/* ---- Section Title Row (共通) ---- */
.sec-title-row {
  display:flex; align-items:baseline; gap:10px; flex-shrink:0;
}
.sec-title { font-size:1.55rem; font-weight:900; white-space:nowrap;color: #fff; }
.sec-meta  { font-size:.8rem; color:#fff; white-space:nowrap; }

/* コンテンツを束ねるラッパー */
.col-section {
  display:flex; flex-direction:column; gap:6px; flex:1; min-height:0;
}
.col-section-auto {
  display:flex; flex-direction:column; gap:6px; flex-shrink:0;
}

/* ---- Train section ---- */
#train-section { display:flex; flex-direction:column; gap:6px; min-height:0; }

#train-grid {
  flex:1; min-height:0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  background: var(--surf);
  padding: 10px;
  border-radius: var(--r);
}

.r-card {
  background: var(--card);
  border-radius: 8px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-height: 0;
  border: 1px solid #fff;
}
.r-head {
  display:flex; align-items:center; gap:8px;
  padding-bottom:5px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  flex-shrink:0;
  color:#fff
}
.r-badge {
  width:30px; height:30px; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; font-weight:900; color:#fff;
  flex-shrink:0;
}
.r-name { font-size:1rem; font-weight:700; }

.d-list { display:flex; flex-direction:column; gap:4px; flex:1; min-height:0; color: #fff;}

.d-row {
  display:flex; align-items:center; justify-content:space-between;
  background: rgba(0,0,0,.22);
  border-radius:7px;
  padding: 5px 8px;
  gap:6px;
}
.d-row:first-child { padding: 6px 10px; }

.d-info { display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
.d-dest {
  font-size:.95rem; font-weight:900;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.d-row:first-child .d-dest { font-size:1.1rem; }
.d-time { font-size:.92rem; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; }

.d-nums { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
.d-cd {
  font-size:1.6rem; font-weight:900;
  font-variant-numeric:tabular-nums; text-align:right; line-height:1;
}
.d-row:first-child .d-cd { font-size:2rem; }
.d-badge {
  font-size:.7rem; font-weight:700;
  padding:2px 8px; border-radius:20px; white-space:nowrap;
}

/* Status colours */
.s-ok    { background:rgba(74,222,128,.14); color:var(--ok);    border:1px solid rgba(74,222,128,.4); }
.s-hurry { background:rgba(251,191,36,.14); color:var(--hurry); border:1px solid rgba(251,191,36,.4); }
.s-tight { background:rgba(248,113,113,.14);color:var(--danger);border:1px solid rgba(248,113,113,.4);}
.s-gone  { background:rgba(100,116,139,.14);color:var(--gone);  border:1px solid rgba(100,116,139,.4);}
.cd-ok    { color:var(--ok); }
.cd-hurry { color:var(--hurry); }
.cd-tight { color:var(--danger); }
.cd-gone  { color:var(--gone); }

/* ---- Bus section ---- */
#bus-section {
  display: flex; flex-direction: column;
  gap: 12px; min-height: 0;
}
.op-block {
  flex:1; min-height:0;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding: 10px;
  display: flex; flex-direction: column;
}
.op-dirs   { display:grid; grid-template-columns:1fr 1fr; gap:8px; flex:1; min-height:0;color: #fff; }
.op-dir    { display:flex; flex-direction:column; gap:4px; min-height:0; }
.op-dir-hd {
  font-size:.85rem; font-weight:700; color:var(--muted);
  border-bottom:1px solid var(--bdr);
  padding-bottom:4px; margin-bottom:2px; flex-shrink:0;
}

/* ---- Right column ---- */
.right-col { display:flex; flex-direction:column; gap:12px; }

.c-box {
  background:var(--surf); border:2px solid var(--bdr);
  border-radius:var(--r); padding:16px 10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
}

.fare-box {
  background:var(--surf); border:1px solid var(--bdr);
  border-radius:var(--r); padding:10px 14px;
  flex:1; display:flex; flex-direction:column; gap:8px; justify-content: center;
}
.fare-item { display:flex; flex-direction:column; gap:1px; }
.fare-name  { font-size:.85rem; font-weight:700;color: #fff; }
.fare-price { font-size:1.4rem; font-weight:900; color:var(--ok); line-height:1.1; font-variant-numeric:tabular-nums;color: #fff; }
.fare-note  { font-size:.65rem; color:var(--muted); color: #fff;}

/* Blink */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
.blink { animation: blink 1.1s ease-in-out infinite; }
</style>
</head>

  <main id="main">

    </div>

</div>

let CURRENT_BUS_OPS = FALLBACK_BUS_OPS;
let isBusDataOnline = false;

/* ============================================================
   GTFS/APIデータ非同期取得関数 (今回はダミー)
   ============================================================ */
async function fetchBusData() {
  try {
    const response = await fetch('bus_timetable.json'); 
    if (!response.ok) throw new Error('Network error');
    const data = await response.json();
    CURRENT_BUS_OPS = data;
    isBusDataOnline = true;
    document.getElementById('data-mode-badge').textContent = 'API取得中';
    document.getElementById('data-mode-badge').style.background = 'var(--accent)';
  } catch (error) {
    CURRENT_BUS_OPS = FALLBACK_BUS_OPS;
    isBusDataOnline = false;
    document.getElementById('data-mode-badge').textContent = '静的データ';
    document.getElementById('data-mode-badge').style.background = 'var(--ok)';
  }
}

/* ============================================================
   共通ユーティリティ（自動ダイヤ判定含む）
   ============================================================ */
const now = () => new Date();

function toDate(hhmm) {
  const [h,m] = hhmm.split(':').map(Number);
  const d = new Date(); d.setHours(h,m,0,0); return d;
}
const minUntil = t => (toDate(t) - now()) / 60000;

// 今日のダイヤ種別を判定（'weekday', 'saturday', 'holiday'）
function getScheduleType(d = now()) {
  const ymd = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  
  if (HOLIDAYS.includes(ymd) || d.getDay() === 0) return 'holiday';
  if (d.getDay() === 6) return 'saturday';
  return 'weekday';
}

// ダイヤ情報から今日の時刻配列を抽出する
function getTimesArray(timesData) {
  // すでに配列ならそのまま（従来の書き方）
  if (Array.isArray(timesData)) return timesData;
  // オブジェクトなら曜日で出し分け
  const type = getScheduleType();
  return timesData[type] || [];
}

function nextDep(timesData, n=2) {
  const times = getTimesArray(timesData);
  return times
    .map(x => typeof x==='string' ? {time:x,dest:null,min:minUntil(x)} : {time:x.time,dest:x.dest,min:minUntil(x.time)})
    .filter(x => x.min > -1)
    .sort((a,b) => a.min-b.min)
    .slice(0,n);
}

function status(min, walk) {
  const hurry  = typeof walk==='object' ? walk.hurry  : walk;
  if (min<0)              return {lbl:'発車済',    sc:'s-gone',  cc:'cd-gone'};
  if (min-hurry >= 5)     return {lbl:'余裕あり',  sc:'s-ok',    cc:'cd-ok'  };
  if (min-hurry >= 2)     return {lbl:'急げばOK',  sc:'s-hurry', cc:'cd-hurry'};
  if (min-hurry >= 0)     return {lbl:'急げ！',  sc:'s-hurry', cc:'cd-hurry'};
  return                         {lbl:'絶望的',    sc:'s-tight', cc:'cd-tight'};
}

const fmtMin = m => m<0?'発車済':m<1?'間もなく':`${Math.floor(m)}分`;

/* ---- 1行の発車情報HTML ---- */
function depRow(dep, def, walk, key, i) {
  const s   = status(dep.min, walk);
  const lbl = dep.dest ? `${dep.dest} 行き` : def;
  const hurry = typeof walk==='object' ? walk.hurry : walk;
  const bl  = (dep.min>=0 && dep.min<hurry) ? ' blink' : '';
  return `
    <div class="d-row">
      <div class="d-info">
        <div class="d-dest">${lbl}</div>
        <div class="d-time">${dep.time}</div>
      </div>
      <div class="d-nums">
        <div class="d-cd ${s.cc}${bl}" id="${key}-cd-${i}">${fmtMin(dep.min)}</div>
        <div class="d-badge ${s.sc}" id="${key}-bd-${i}">${s.lbl}</div>
      </div>
    </div>`;
}

/* ============================================================
   UI生成
   ============================================================ */
function buildTrain() {
  const g = document.getElementById('train-grid');
  g.innerHTML = '';
  TRAIN_LINES.forEach(line => {
    const nexts = nextDep(line.times, 2);
    let rows = '<div class="d-list">';
    if (!nexts.length) {
      rows += `<div style="color:var(--muted);font-size:.9rem;padding:6px 0">本日の運行終了</div>`;
    } else {
      nexts.forEach((d,i) => { rows += depRow(d, line.def, WALK.train, `tr-${line.id}`, i); });
    }
    rows += '</div>';
    const c = document.createElement('div');
    c.className = 'r-card';
    c.id = `tr-${line.id}`;
    c.innerHTML = `
      <div class="r-head">
        <div class="r-badge" style="background:${line.bg}">${line.badge}</div>
        <div class="r-name">${line.name}</div>
      </div>${rows}`;
    g.appendChild(c);
  });
}

function buildBus() {
  const sec = document.getElementById('bus-section');
  sec.innerHTML = '';
  CURRENT_BUS_OPS.forEach(op => {
    const wrapper = document.createElement('div');
    wrapper.className = 'col-section';
    
    const dirsHtml = op.dirs.map(dir => {
      const nexts = nextDep(dir.times, 2);
      let rows = '';
      if (!nexts.length) {
        rows = `<div style="color:var(--muted);font-size:.8rem;padding:4px 0">運行終了</div>`;
      } else {
        nexts.forEach((d,i) => { rows += depRow(d, dir.short, op.walk, `bs-${dir.id}`, i); });
      }
      return `<div class="op-dir"><div class="op-dir-hd">${dir.name}</div>${rows}</div>`;
    }).join('');
    
    wrapper.innerHTML = `
      <div class="sec-title-row">
        <span class="sec-title">${op.name}</span>
        <span class="sec-meta">${op.stop}</span>
      </div>
      <div class="op-block" id="bs-${op.id}">
        <div class="op-dirs">${dirsHtml}</div>
      </div>`;
    
    sec.appendChild(wrapper);
  });
}

/* ============================================================
   カウントダウン更新（10秒）
   ============================================================ */
function updateCD() {
  TRAIN_LINES.forEach(line => {
    nextDep(line.times,2).forEach((d,i) => {
      const cd=document.getElementById(`tr-${line.id}-cd-${i}`);
      const bd=document.getElementById(`tr-${line.id}-bd-${i}`);
      if(!cd||!bd) return;
      const s=status(d.min,WALK.train);
      const bl=(d.min>=0&&d.min<WALK.train.hurry)?' blink':'';
      cd.textContent=fmtMin(d.min); cd.className=`d-cd ${s.cc}${bl}`;
      bd.textContent=s.lbl;          bd.className=`d-badge ${s.sc}`;
    });
  });
  CURRENT_BUS_OPS.forEach(op => {
    op.dirs.forEach(dir => {
      nextDep(dir.times,2).forEach((d,i) => {
        const cd=document.getElementById(`bs-${dir.id}-cd-${i}`);
        const bd=document.getElementById(`bs-${dir.id}-bd-${i}`);
        if(!cd||!bd) return;
        const s=status(d.min,op.walk);
        const bl=(d.min>=0&&d.min<op.walk.hurry)?' blink':'';
        cd.textContent=fmtMin(d.min); cd.className=`d-cd ${s.cc}${bl}`;
        bd.textContent=s.lbl;          bd.className=`d-badge ${s.sc}`;
      });
    });
  });
}

/* ============================================================
   時計とカレンダー・バッジ更新
   ============================================================ */
function updateClock() {
  const n=now(), p=x=>String(x).padStart(2,'0');
  document.getElementById('clock').textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  const w=['日','月','火','水','木','金','土'];
  document.getElementById('hdr-date').textContent=`${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日（${w[n.getDay()]}）`;

  // 現在適用されているダイヤのバッジ表示
  const schedMap = { 'weekday': '平日ダイヤ', 'saturday': '土曜ダイヤ', 'holiday': '休日ダイヤ' };
  document.getElementById('sched-badge').textContent = schedMap[getScheduleType(n)];
}

/* ============================================================
   フル更新（1分）
   ============================================================ */
async function fullUpdate() {
  await fetchBusData();
  buildTrain(); buildBus();
  const n=now(), p=x=>String(x).padStart(2,'0');
  document.getElementById('update-time-badge').textContent=`・更新 ${p(n.getHours())}:${p(n.getMinutes())}`;
}

/* ============================================================
   初期化
   ============================================================ */
(async function(){
  updateClock();
  await fullUpdate();
  setInterval(updateClock, 1000);
  setInterval(updateCD,    10000);
  setInterval(fullUpdate,  60000);
})();
</script>
